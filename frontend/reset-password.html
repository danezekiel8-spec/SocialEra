<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialEra - Reset Password</title>

  <link rel="stylesheet" href="auth-pages.css">
  <link rel="stylesheet" href="theme.css">
  <script src="theme.js?v=auth-session-5"></script>
</head>
<body class="auth-page-body">

  <header>
    <a href="index.html" class="logo">
      <div>
      <h1 class="logo-word">
        <span>S</span><span>o</span><span>c</span><span>i</span><span>a</span><span>l</span><span>E</span><span>r</span><span>a</span>
      </h1>
      <p>Social Shopping</p>
      </div>
      <img src="assets/SocialEra-Logo.png" alt="SocialEra logo" class="logo-mark-image">
    </a>

    <nav class="top-nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html" class="cart-button">Cart</a>
    </nav>
  </header>

  <main class="page-wrap">
    <section class="auth-card">
      <div class="auth-top">
        <span class="auth-eyebrow">Account recovery</span>
        <h2 class="auth-title">Reset your password</h2>
        <p class="auth-subtitle">Choose a new password after opening your recovery link.</p>
      </div>

      <div class="auth-body">
        <div id="status-message" class="status"></div>

        <form id="reset-password-form" class="auth-form">
          <div class="field">
            <label for="new-password">New password</label>
            <input type="password" id="new-password" name="new-password" placeholder="Create a new password" required />
            <div class="helper">Minimum 6 characters.</div>
          </div>

          <div class="field">
            <label for="confirm-password">Confirm new password</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Repeat the new password" required />
          </div>

          <button type="submit" id="reset-password-button" class="auth-button">Save New Password</button>
        </form>

        <div class="auth-bottom">
          Return to
          <a href="login.html">Log in</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 SocialEra</p>
  </footer>

  <script type="module" src="supabase.js?v=auth-session-6"></script>
  <script src="public-page.js?v=auth-session-4"></script>
  <script src="auth-reset.js?v=auth-session-6"></script>
</body>
</html>
