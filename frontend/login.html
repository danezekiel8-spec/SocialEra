<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialEra - Log In</title>

  <link rel="stylesheet" href="auth-pages.css">
  <link rel="stylesheet" href="theme.css">
  <script src="theme.js?v=auth-session-4"></script>
</head>
<body class="auth-page-body">

  <header>
    <a href="index.html" class="logo">
      <div>
      <h1 class="logo-word">
        <span>S</span><span>o</span><span>c</span><span>i</span><span>a</span><span>l</span><span>E</span><span>r</span><span>a</span>
      </h1>
      <p>Social Shopping</p>
      </div>
      <img src="assets/SocialEra-Logo.png" alt="SocialEra logo" class="logo-mark-image">
    </a>

    <nav class="top-nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html" class="cart-button">Cart</a>
    </nav>
  </header>

  <main class="page-wrap">
    <section class="auth-card">
      <div class="auth-top">
        <span class="auth-eyebrow">Welcome back</span>
        <h2 class="auth-title">Log In to SocialEra</h2>
        <p class="auth-subtitle">
          Access your account, saved items, future wishlist, and your SocialEra profile.
        </p>
      </div>

      <div class="auth-body">
        <div id="status-message" class="status"></div>

        <form id="login-form" class="auth-form">
          <div class="field">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required />
            <div class="helper">Use the same email and password you used when signing up.</div>
          </div>

          <button type="submit" id="login-button" class="auth-button">Log In</button>
        </form>

        <div class="auth-bottom">
          Don’t have an account?
          <a href="signup.html">Create one</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 SocialEra</p>
  </footer>

  <script type="module" src="supabase.js?v=auth-session-4"></script>
  <script src="public-page.js?v=auth-session-4"></script>
  <script src="auth-login.js?v=auth-session-4"></script>
</body>
</html>
